services:
  whatsapp:
    build:
      context: ./whatsapp-service
      dockerfile: Dockerfile
    container_name: antonia80-whatsapp
    restart: unless-stopped
    ports:
      - "${PORT:-3100}:3100"
    environment:
      PORT: 3100
      API_KEY: ${API_KEY:?Defina API_KEY no ambiente}
    volumes:
      - whatsapp-auth:/app/.wwebjs_auth
    # Chromium precisa de syscalls bloqueadas pelo seccomp padrão do Docker
    security_opt:
      - seccomp:unconfined
    mem_limit: 768m
    memswap_limit: 768m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3100/status',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  whatsapp-auth:
    driver: local
